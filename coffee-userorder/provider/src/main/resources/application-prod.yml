# 生产环境配置（EDAS 部署时加载）
# Dubbo 注册中心由 EDAS Pandora Agent 自动接管，无需在此配置

database:
  user: ${DB_USER:userordertest}
  password: ${DB_PASSWORD:Userordertest123}
  host: ${DB_HOST:rm-2ze9l0n62f3p22hrwgo.mysql.rds.aliyuncs.com:3306}
  dbname: ${DB_NAME:userordertest}

# ── Redis（生产环境通过环境变量注入阿里云 Tair/Redis 地址）──
# 注意：使用默认账号时 REDIS_PASSWORD 填密码；使用自定义账号时填 "用户名:密码"
spring:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

# ── RocketMQ（生产环境连接阿里云托管 RocketMQ，需 AccessKey 认证）──
# ROCKETMQ_NAMESERVER：控制台"接入点"地址，格式 host:9876
# ROCKETMQ_ACCESS_KEY / ROCKETMQ_SECRET_KEY：RAM 子账号 AccessKey，从控制台获取
rocketmq:
  name-server: ${ROCKETMQ_NAMESERVER:127.0.0.1:9876}
  access-channel: CLOUD
  producer:
    access-key: ${ROCKETMQ_ACCESS_KEY:}
    secret-key: ${ROCKETMQ_SECRET_KEY:}

# ── 功能开关（生产环境默认全部开启）──────────────────────────
feature:
  cache:
    enabled: true
  mq:
    enabled: true
