server:
  port: 7001
spring:
  application:
    name: coffee-userorder
  profiles:
    active: ${ENV:dev}
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  datasource:
    name: coffee-userorder
    url: jdbc:mysql://${database.host}/${database.dbname}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true
    username: ${database.user}
    password: ${database.password}
    # MySQL 8 驱动类（com.mysql.cj.jdbc.Driver）
    driver-class-name: com.mysql.cj.jdbc.Driver
mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
dubbo:
  scan:
    base-packages: com.coffee.yun.userorder
  application:
    name: coffee-userorder
  registry:
    address: nacos://${nacos.host:127.0.0.1}:${nacos.port:8848}
  protocol:
    name: dubbo
    # Dubbo 3.x 推荐使用 fastjson2 序列化
    serialization: fastjson2
