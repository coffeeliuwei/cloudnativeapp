server:
  port: 7001

spring:
  application:
    name: coffee-userorder
  profiles:
    active: ${ENV:dev}
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  datasource:
    name: coffee-userorder
    # MySQL 8.0 JDBC URL（去除已废弃的 useSSL=false，改用 sslMode=DISABLED）
    url: jdbc:mysql://${database.host}/${database.dbname}?serverTimezone=UTC&useUnicode=true&characterEncoding=utf-8&sslMode=DISABLED&allowPublicKeyRetrieval=true
    username: ${database.user}
    password: ${database.password}
    # MySQL 8.0 驱动类名已更改（旧版 com.mysql.jdbc.Driver 已废弃）
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

dubbo:
  scan:
    base-packages: com.coffee.yun.userorder
  application:
    name: coffee-userorder
    # Dubbo 3.x 推荐使用 Hessian2 序列化（兼容性好）
    serialize-check-status: WARN
  registry:
    address: nacos://127.0.0.1:8848
  protocol:
    name: dubbo
    port: -1
