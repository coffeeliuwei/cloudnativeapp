# ============================================================
# coffee-userorder 主配置文件
# 作用：定义服务运行参数，引用 application-dev.yml 中的敏感配置。
# 注意：此文件提交到 Git；包含真实密码的 application-dev.yml 不提交。
# ============================================================

# ── HTTP 服务端口 ──────────────────────────────────────────
server:
  port: 7001   # 前端/网关通过此端口访问本服务的 HTTP 接口（健康检查等）

# ── Spring 基础配置 ────────────────────────────────────────
spring:
  application:
    # 服务名称，有两个重要用途：
    # 1. Nacos 用此名称标识本服务（其他服务通过此名称发现本服务）
    # 2. 日志、监控中显示的服务标识
    name: coffee-userorder

  profiles:
    # 激活哪套配置文件。${ENV:dev} 表示：
    # - 先读系统环境变量 ENV 的值
    # - 如果未设置 ENV，默认使用 dev（即加载 application-dev.yml）
    # 生产环境启动时设置 ENV=prod，则加载 application-prod.yml
    active: ${ENV:dev}

  jackson:
    # 全局 JSON 日期格式，接口返回的所有日期字段统一格式化为此形式
    date-format: yyyy-MM-dd HH:mm:ss
    # 时区设置为东八区（北京时间），防止日期字段差8小时
    time-zone: GMT+8

  # ── Redis 连接（Spring Boot 2.x 使用 spring.redis.*，3.x 改为 spring.data.redis.*）────
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    timeout: 2000ms

  # ── Nacos Config 动态配置（可在 Nacos 控制台热更新缓存 TTL，无需重启）──────────────────
  config:
    import: "optional:nacos:coffee-userorder.properties?server-addr=${NACOS_ADDR:127.0.0.1:8848}&refreshEnabled=true"

  datasource:
    name: coffee-userorder
    # JDBC 连接 URL，各参数说明：
    # ${database.host}       → 从 application-dev.yml 读取阿里云 RDS 地址
    # ${database.dbname}     → 从 application-dev.yml 读取数据库名
    # serverTimezone=UTC     → 数据库服务器时区（RDS默认UTC，与本地时间差8小时，由 jackson.time-zone 补偿）
    # useUnicode=true        → 启用 Unicode 编码，支持中文
    # characterEncoding=utf-8 → 字符集设为 UTF-8，防止中文乱码
    # sslMode=DISABLED       → 关闭 SSL（MySQL 8.0 新参数，替代旧版 useSSL=false）
    # allowPublicKeyRetrieval=true → MySQL 8.0 新认证插件需要此参数，否则连接报错
    url: jdbc:mysql://${database.host}/${database.dbname}?serverTimezone=UTC&useUnicode=true&characterEncoding=utf-8&sslMode=DISABLED&allowPublicKeyRetrieval=true
    # 数据库账号和密码，从 application-dev.yml 读取，不在此处硬编码
    username: ${database.user}
    password: ${database.password}
    # MySQL 8.0 的 JDBC 驱动类名（旧版 com.mysql.jdbc.Driver 已废弃）
    driver-class-name: com.mysql.cj.jdbc.Driver

# ── MyBatis 配置 ───────────────────────────────────────────
mybatis:
  # Mapper XML 文件的位置，classpath 指 resources 目录
  # *.xml 表示扫描 resources/mapper/ 目录下所有 XML 文件
  mapper-locations: classpath:mapper/*.xml
  configuration:
    # 开发阶段打印完整 SQL 语句到控制台，方便调试
    # 生产环境建议改为 org.apache.ibatis.logging.slf4j.Slf4jImpl（输出到日志文件）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# ── RocketMQ 生产者（默认 Name Server 地址，dev/prod 可通过环境变量覆盖）──────────────────
rocketmq:
  name-server: ${ROCKETMQ_NAMESERVER:127.0.0.1:9876}
  # LOCAL = 自托管 RocketMQ（开发/本地）；CLOUD = 阿里云托管（生产由 application-prod.yml 覆盖为 CLOUD）
  access-channel: ${ROCKETMQ_ACCESS_CHANNEL:LOCAL}
  producer:
    group: userorder-producer-group
    send-message-timeout: 3000
    # 阿里云 RocketMQ 认证（本地自托管无需设置；EDAS 生产通过环境变量注入）
    access-key: ${ROCKETMQ_ACCESS_KEY:}
    secret-key: ${ROCKETMQ_SECRET_KEY:}

# ── Dubbo RPC 配置 ─────────────────────────────────────────
dubbo:
  scan:
    # Dubbo 扫描此包下带有 @DubboService 注解的类，将其注册为 RPC 服务提供者
    base-packages: com.coffee.yun.userorder

  application:
    # Dubbo 服务的应用名，在 Nacos 控制台中显示，建议与 spring.application.name 保持一致
    name: coffee-userorder
    # WARN 级别：发现不安全的序列化类时打印警告，但不阻止启动（STRICT 会直接拒绝）
    serialize-check-status: WARN

  registry:
    # 通过环境变量 DUBBO_REGISTRY 注入注册中心地址：
    # - 本地开发默认用 127.0.0.1:8848（本地 Nacos）
    # - EDAS 部署时在控制台设置环境变量指向 EDAS 内置注册中心
    address: ${DUBBO_REGISTRY:nacos://127.0.0.1:8848}

  protocol:
    # 使用 Dubbo 私有二进制协议（比 HTTP 更高效，适合内部服务间调用）
    name: dubbo
    # port: -1 表示由 Dubbo 自动分配端口
    # 若需固定端口（如防火墙规则需要），可改为指定值，如 port: 20880
    port: -1
