# =====================================================================
# Nginx 配置文件：托管 CoffeeTrack 前端静态文件
# 用途：把这个文件上传到 ECS-3 的 /etc/nginx/conf.d/ 目录即可
# =====================================================================

server {
    # 监听 80 端口（HTTP 默认端口，浏览器访问 http://IP 时打到这里）
    listen 80;

    # 前端静态文件所在目录（学生上传 dist/ 到这里）
    root /var/www/coffee-admin;

    # 默认入口页面
    index index.html;

    # Vue Router history 模式必需：刷新子路由页面不报 404
    # 例如刷新 /admin/orders，本来会找不到 orders 文件，
    # 这一段告诉 Nginx 找不到就回退到 index.html，由 Vue Router 处理路由
    location / {
        try_files $uri $uri/ /index.html;
    }
}
