server:
  port: 8001

spring:
  application:
    name: coffee-expresstrack
  profiles:
    active: ${ENV:dev}
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  datasource:
    name: coffee-expresstrack
    url: jdbc:mysql://${database.host}/${database.dbname}?serverTimezone=UTC&useUnicode=true&characterEncoding=utf-8&sslMode=DISABLED&allowPublicKeyRetrieval=true
    username: ${database.user}
    password: ${database.password}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

dubbo:
  scan:
    base-packages: com.coffee.yun.expresstrack
  application:
    name: coffee-expresstrack
    serialize-check-status: WARN
  registry:
    address: nacos://127.0.0.1:8848
  protocol:
    name: dubbo
    # 显式指定 Dubbo RPC 端口（与 HTTP 端口 8001 不同）
    port: 28888
