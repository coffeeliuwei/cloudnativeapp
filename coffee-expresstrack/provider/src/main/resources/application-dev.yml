# 开发环境配置（本地启动时设置 ENV=dev 加载此文件）

dubbo:
  registry:
    address: nacos://127.0.0.1:8848

# 开发环境数据库配置
# 此文件包含真实的数据库连接信息，已在 .gitignore 中排除，不会提交到 Git 仓库
# 部署到其他环境时，替换下方各字段的默认值，或通过环境变量注入（如 DB_HOST=xxx java -jar ...）

database:
  # 数据库账号，优先读取环境变量 DB_USER，未设置时使用默认值 expresstracktest
  user: ${DB_USER:expresstracktest}

  # 数据库密码，优先读取环境变量 DB_PASSWORD，未设置时使用默认值
  password: ${DB_PASSWORD:Expresstracktest123}

  # 阿里云 RDS MySQL 8.0 连接地址（内网地址，仅在阿里云 VPC 内可访问）
  # 格式：<实例连接地址>:<端口>
  # rm-2ze9l0n62f3p22hrwgo.mysql.rds.aliyuncs.com 是阿里云 RDS 控制台分配的实例域名
  # 与 coffee-userorder 使用同一台 RDS 实例，通过不同数据库名（expresstracktest）隔离数据
  # 本地开发时若无法访问，需在 RDS 控制台将本机 IP 加入白名单，或使用公网地址
  host: ${DB_HOST:rm-2ze9l0n62f3p22hrwgo.mysql.rds.aliyuncs.com:3306}

  # 数据库名称
  dbname: ${DB_NAME:expresstracktest}

# ── Redis（开发环境默认连本地）──────────────────────────────
# Spring Boot 2.x 使用 spring.redis.*（3.x 改为 spring.data.redis.*）
spring:
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}

# ── RocketMQ（Name Server 默认为空，未配置时自动跳过 RocketMQ 初始化）
rocketmq:
  name-server: ${ROCKETMQ_NAMESERVER:}

# ── 缓存 TTL 默认值（可在 Nacos Config 中覆盖，无需重启生效）──
# Nacos 数据 ID：coffee-expresstrack.properties
cache:
  ttl:
    # 快递轨迹缓存时长（秒），默认 1 小时（轨迹数据更新频率低）
    expresstrack: 3600

# ── 功能开关（默认全部关闭，保持原项目可正常启动）────────────
feature:
  cache:
    enabled: false   # true = 启用 Redis 缓存（需先启动 Redis）
  mq:
    enabled: false   # true = 启用 RocketMQ（需先启动 RocketMQ 并设置 ROCKETMQ_NAMESERVER）
