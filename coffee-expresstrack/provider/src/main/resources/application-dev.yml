# 开发环境配置（本地启动时设置 ENV=dev 加载此文件）
#
# 默认连接本地，切换到云上只需设置对应环境变量再启动，无需改代码：
#
#   本地（默认）：不设任何环境变量，直接 java -jar 启动即可
#
#   切换到云上 MSE Nacos + RDS：
#     NACOS_ADDR=mse-xxx.nacos.aliyuncs.com:8848
#     DUBBO_REGISTRY=nacos://mse-xxx.nacos.aliyuncs.com:8848
#     DB_HOST=rm-xxx.mysql.rds.aliyuncs.com:3306
#     DB_USER=<RDS用户名>
#     DB_PASSWORD=<RDS密码>
#
#   dubbo2 分支切换到 EDAS 内置 Nacos（地址替换为 EDAS 分配的 Nacos 地址）：
#     NACOS_ADDR=<EDAS-Nacos地址>:8848
#     DUBBO_REGISTRY=nacos://<EDAS-Nacos地址>:8848
#     DB_HOST / DB_USER / DB_PASSWORD 同上

dubbo:
  registry:
    # 默认本地 Nacos；云上部署时通过 DUBBO_REGISTRY 环境变量注入 MSE/EDAS Nacos 地址
    address: ${DUBBO_REGISTRY:nacos://127.0.0.1:8848}

# Nacos 配置中心地址在 application.yml 的 spring.config.import 里通过
# ${NACOS_ADDR:127.0.0.1:8848} 控制，无需在此重复配置

database:
  # 默认本地 MySQL；云上部署时通过环境变量注入 RDS 连接信息
  user: ${DB_USER:root}
  password: ${DB_PASSWORD:123456}
  host: ${DB_HOST:localhost:3307}
  dbname: ${DB_NAME:expresstracktest}
