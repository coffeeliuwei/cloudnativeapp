# ============================================================
# coffee-app 配置文件（API 网关服务）
# 作用：定义网关服务的运行参数和 Dubbo 消费者配置。
# 注意：coffee-app 不连接数据库，只负责接收前端请求并通过 Dubbo 调用后端服务。
# ============================================================

# 服务名称，在 Nacos 控制台和日志中显示
spring.application.name=coffee-app

# HTTP 服务端口，前端 app-admin 通过此端口访问所有接口
# 前端 Axios 请求地址：http://localhost:8005/xxx
server.port=8005

# 激活配置 profile：-DENV=prod 时加载 application-prod.properties
# 未设置时默认 dev，加载 application-dev.properties
spring.profiles.active=${ENV:dev}

# ── Dubbo 消费者配置 ───────────────────────────────────────

# Dubbo 应用名（建议与 spring.application.name 保持一致）
dubbo.application.name=coffee-app

# WARN 级别：发现不安全的序列化类时打印警告，但不阻止启动
dubbo.application.serialize-check-status=WARN

# 服务注册中心地址，通过环境变量 DUBBO_REGISTRY 注入
# - 本地开发默认连接本地 Nacos（127.0.0.1:8848）
# - EDAS 部署时 Agent 自动拦截并重定向到绑定的 MSE Nacos，此配置被覆盖
dubbo.registry.address=${DUBBO_REGISTRY:nacos://localhost:8848}

# 使用 Dubbo 私有二进制协议与后端服务通信
dubbo.protocol.name=dubbo

# 注意：coffee-app 是纯消费者（Consumer），不提供任何 Dubbo 服务，
# 因此无需配置 dubbo.protocol.port 和 dubbo.scan.base-packages
